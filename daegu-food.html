<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대구광역시 맛집 — VIBE</title>
    <meta
      name="description"
      content="대구광역시 구·군별 맛집 목록. 대구음식 오픈 API 기반."
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="food-page">
    <div class="bg-atmosphere" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="./index.html">VIBE<span>.</span></a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="./index.html#projects">Projects</a>
        <a href="./index.html#stack">Stack</a>
        <a href="./daegu-food.html" aria-current="page">대구 맛집</a>
        <a href="./index.html#contact">Contact</a>
      </nav>
      <button
        type="button"
        class="theme-toggle"
        id="themeToggle"
        aria-label="테마 전환"
        title="라이트/다크 모드 전환"
      >
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
          </svg>
        </span>
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3 7 7 0 0 0 21 14.5z" />
          </svg>
        </span>
      </button>
    </header>

    <main class="food-main">
      <section class="food-hero">
        <p class="food-hero__label">대구음식 오픈 API</p>
        <h1 class="food-hero__title">대구광역시 맛집</h1>
        <p class="food-hero__desc">
          구·군을 선택하면 해당 지역의 추천 맛집 목록을 불러옵니다.
        </p>
        <a class="btn btn--ghost food-hero__back" href="./index.html">← 포트폴리오로 돌아가기</a>
      </section>

      <section class="food-districts" aria-labelledby="districtTitle">
        <div class="food-districts__head">
          <h2 id="districtTitle">구역 선택</h2>
          <p>원하시는 구·군을 눌러 주세요.</p>
        </div>
        <div class="food-districts__grid" id="districtGrid" role="tablist" aria-label="대구 구·군"></div>
      </section>

      <section class="food-results" aria-labelledby="resultsTitle">
        <div class="food-results__head">
          <div>
            <h2 id="resultsTitle">맛집 목록</h2>
            <p id="resultsMeta" class="food-results__meta">구역을 선택해 주세요.</p>
          </div>
          <label class="food-search">
            <span class="visually-hidden">맛집 검색</span>
            <input
              type="search"
              id="foodSearch"
              placeholder="가게명·음식 종류 검색"
              autocomplete="off"
            />
          </label>
        </div>

        <p class="food-status" id="foodStatus" aria-live="polite"></p>
        <div class="food-list" id="foodList"></div>
        <nav class="food-pagination" id="foodPagination" aria-label="맛집 페이지" hidden></nav>
      </section>
    </main>

    <footer class="site-footer">
      <p>데이터 출처: <a href="https://www.daegufood.go.kr/" target="_blank" rel="noopener noreferrer">대구음식</a> 오픈 API</p>
    </footer>

    <script src="./app.js"></script>
    <script src="./daegu-food.js"></script>
  </body>
</html>
